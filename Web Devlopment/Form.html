<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="form_style.css">
</head>
<body>
    <h1><Centre>Payment Form for Your MAKAUT Registration</Centre></h1>
    <form>
        <!--User name-->
        <label for="username">Username:</label>
        <input type ="text" id="username" required>
        <!--password-->
        <label for="password">Password:</label>
        <input type="Password" id="Password" required><br><br>
        <!--Email-->
        <label for="email">Email id.:</label><br>
        <input type="email" id="email" required><br><br>
        <!--phone no.-->
        <label for="phone no.">Phone no.:</label>
        <input type="phone no." id="phone no." pattern="[0-9]{10}"><br><br>
        <!--Gender-->
        <label for="Gender">Gender:</label>
        <input type="radio" id="Male" name="Gender" value="male">
        <label for="Male">Male</label>
        <input type="radio" id="Female" name="Gender" value="female">
        <label for="Female">female</label>
        <input type="radio" id="Others not to say" name="Gender" value="Others not to say">
        <label for="Others not to say">Others not to say</label>
        <!--Documents-->
        <P>Documents are required as following</P>
        <ul>
            <li>Original Higher Secondary Marksheet</li>
            <li>Verified Documents by college</li>
        </ul>
        <!--upload-->
        <label for="Upload">Upload your HS Marksheet:</label>
        <input type="file" id="upload" name="Upload" value="upload">


    </form>
</body>
</html>
